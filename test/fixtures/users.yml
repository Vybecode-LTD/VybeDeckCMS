  password_digest: <%= password_digest %>
  email_verified_at: <%= 1.day.ago.to_fs(:db) %>

two:
  email_address: two@example.com
  password_digest: <%= password_digest %>
  email_verified_at: <%= 1.day.ago.to_fs(:db) %>

member_user:
  email_address: member@example.com
  password_digest: <%= password_digest %>
  role: 3
  email_verified_at: <%= 1.day.ago.to_fs(:db) %>

subscriber_user:
  email_address: subscriber@example.com
  password_digest: <%= password_digest %>
  role: 4
  email_verified_at: <%= 1.day.ago.to_fs(:db) %>
