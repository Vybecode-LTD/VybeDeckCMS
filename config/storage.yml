test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Cloudflare R2 (S3-compatible). Set CLOUDFLARE_R2_* env vars in Railway.
# CLOUDFLARE_ACCOUNT_ID is used to build the endpoint URL.
cloudflare:
  service: S3
  access_key_id: <%= ENV.fetch("CLOUDFLARE_R2_ACCESS_KEY_ID", "") %>
  secret_access_key: <%= ENV.fetch("CLOUDFLARE_R2_SECRET_ACCESS_KEY", "") %>
  region: auto
  bucket: <%= ENV.fetch("CLOUDFLARE_R2_BUCKET", "") %>
  endpoint: https://<%= ENV.fetch("CLOUDFLARE_ACCOUNT_ID", "MISSING") %>.r2.cloudflarestorage.com
  force_path_style: false

# Remember not to checkin your GCS keyfile to a repository
